<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Telemetry Analysis</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-text">F1</span>
                <span class="logo-sub">TELEMETRY</span>
            </div>
        </div>

        <div class="header-center">
            <nav class="breadcrumb">
                <span class="breadcrumb-item">2024</span>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-item" id="breadcrumb-race">--</span>
                <span class="breadcrumb-sep">/</span>
                <span class="breadcrumb-item" id="breadcrumb-session">--</span>
            </nav>
        </div>

        <div class="header-right">
            <div class="toggle-group">
                <!-- Theme Toggle -->
                <button class="toggle-btn" id="theme-toggle" title="Toggle light/dark mode">
                    <span class="toggle-icon">☀️</span>
                </button>

                <!-- Design Toggle -->
                <button class="toggle-btn" id="design-toggle" title="Toggle flat/glass design">
                    <span class="toggle-label">FLAT</span>
                </button>

                <!-- Mobile Menu Toggle -->
                <button class="toggle-btn hamburger" id="hamburger-menu" title="Toggle sidebar">
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                    <span class="hamburger-line"></span>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- Dropdowns Section -->
                <div class="dropdowns-section">
                    <div class="dropdown-group">
                        <label for="year-select">Year</label>
                        <select id="year-select" class="dropdown">
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                        </select>
                    </div>

                    <div class="dropdown-group">
                        <label for="race-select">Race</label>
                        <select id="race-select" class="dropdown">
                            <option value="">Loading...</option>
                        </select>
                    </div>

                    <div class="dropdown-group">
                        <label for="session-select">Session</label>
                        <select id="session-select" class="dropdown">
                            <option value="FP1">FP1</option>
                            <option value="FP2">FP2</option>
                            <option value="FP3">FP3</option>
                            <option value="Qualifying">Qualifying</option>
                            <option value="Race" selected>Race</option>
                        </select>
                    </div>
                </div>

                <!-- Divider -->
                <div class="sidebar-divider"></div>

                <!-- Race List Section -->
                <div class="sidebar-section">
                    <h3 class="section-title">Races</h3>
                    <div class="race-list" id="race-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Divider -->
                <div class="sidebar-divider"></div>

                <!-- Sessions Section -->
                <div class="sidebar-section">
                    <h3 class="section-title">Sessions</h3>
                    <div class="sessions-list" id="sessions-list">
                        <button class="session-btn" data-session="FP1">P1</button>
                        <button class="session-btn" data-session="FP2">P2</button>
                        <button class="session-btn" data-session="FP3">P3</button>
                        <button class="session-btn" data-session="Qualifying">QUALY</button>
                        <button class="session-btn active" data-session="Race">RACE</button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="sidebar-divider"></div>

                <!-- Laps Section -->
                <div class="sidebar-section">
                    <h3 class="section-title">Laps</h3>
                    <div class="laps-filter">
                        <button class="filter-btn active" data-filter="best">Best</button>
                        <button class="filter-btn" data-filter="last5">Last 5</button>
                        <button class="filter-btn" data-filter="all">All</button>
                    </div>
                    <div class="laps-list" id="laps-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Sidebar Close Button (Mobile) -->
            <button class="sidebar-close" id="sidebar-close">✕</button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Driver Selection Grid -->
            <section class="driver-selection-section">
                <h2 class="section-header">Select Drivers</h2>
                <div class="driver-grid" id="driver-grid">
                    <!-- Populated by JS -->
                </div>
            </section>

            <!-- Selected Drivers Box -->
            <section class="selected-drivers-section">
                <h2 class="section-header">Selected Drivers</h2>
                <div class="selected-drivers-display" id="selected-drivers-display">
                    <!-- Shows selected drivers -->
                </div>
            </section>

            <!-- Telemetry Graphs Section -->
            <section class="graphs-section">
                <h2 class="section-header">Telemetry Comparison</h2>

                <!-- Speed Graph -->
                <div class="graph-container">
                    <h3 class="graph-title">Speed (km/h)</h3>
                    <canvas id="speed-graph" class="graph-canvas"></canvas>
                </div>

                <!-- Throttle Graph -->
                <div class="graph-container">
                    <h3 class="graph-title">Throttle (%)</h3>
                    <canvas id="throttle-graph" class="graph-canvas"></canvas>
                </div>

                <!-- Brake Graph -->
                <div class="graph-container">
                    <h3 class="graph-title">Brake (%)</h3>
                    <canvas id="brake-graph" class="graph-canvas"></canvas>
                </div>

                <!-- DRS Graph -->
                <div class="graph-container">
                    <h3 class="graph-title">DRS Status</h3>
                    <canvas id="drs-graph" class="graph-canvas"></canvas>
                </div>
            </section>

            <!-- Stats Tables Section -->
            <section class="stats-section">
                <h2 class="section-header">Lap Statistics</h2>
                
                <!-- Lap Times Table -->
                <div class="table-container">
                    <h3 class="table-title">Lap Times</h3>
                    <table class="stats-table" id="lap-times-table">
                        <thead>
                            <tr>
                                <th>Driver</th>
                                <th>Lap</th>
                                <th>Lap Time</th>
                                <th>Gap</th>
                                <th>S1</th>
                                <th>S2</th>
                                <th>S3</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Sector Comparison Table -->
                <div class="table-container">
                    <h3 class="table-title">Sector Comparison</h3>
                    <table class="stats-table" id="sector-comparison-table">
                        <thead>
                            <tr>
                                <th>Sector</th>
                                <th>Driver 1</th>
                                <th>Driver 2</th>
                                <th>Δ</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="data/mock-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
